<rect x="630" y="130" width="310" height="340" rx="16" fill="#ffffff" stroke="#0f766e" stroke-width="1.3" stroke-dasharray="6 4"/>
<text x="785.0" y="160" text-anchor="middle" font-family="Georgia, 'Iowan Old Style', serif" font-size="13" font-weight="bold" fill="#0f766e">General rule</text>
<text x="654" y="200" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#1d1d1b">shape</text>
<text x="798" y="200" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#1d1d1b">[d_0, d_1, ..., d_n]</text>
<text x="654" y="222" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#1d1d1b">stride[i]</text>
<text x="798" y="222" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#1d1d1b">d_{i+1} × ... × d_n</text>
<text x="654" y="266" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#64748b">for shape [2, 4]</text>
<text x="798" y="266" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#64748b">:</text>
<text x="654" y="288" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="bold" fill="#7c3aed">  stride[0]</text>
<text x="798" y="288" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="bold" fill="#7c3aed">= 4   ← row stride</text>
<text x="654" y="310" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="bold" fill="#b45309">  stride[1]</text>
<text x="798" y="310" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="bold" fill="#b45309">= 1   ← col stride</text>
<text x="654" y="354" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#1d1d1b">flatIndex([i,j])</text>
<text x="798" y="354" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#1d1d1b">= i × stride[0] + j × stride[1]</text>
<text x="798" y="376" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#1d1d1b">= i × 4 + j × 1</text>
<text x="654" y="420" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#64748b">for [i=1, j=2]</text>
<text x="798" y="420" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="normal" fill="#64748b">:</text>
<text x="798" y="442" text-anchor="start" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" font-weight="bold" fill="#b45309">1 × 4 + 2 = 6   →   data[6]</text>
<rect x="60" y="470" width="860" height="36" rx="12" fill="rgba(124,58,237,0.05)" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="6 4"/>
<text x="490.0" y="492" text-anchor="middle" font-family="Georgia, 'Iowan Old Style', serif" font-size="11" font-weight="bold" fill="#7c3aed">stride[i]  =  how many flat-buffer cells you skip when you advance one step along axis i</text>
</svg>