<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" width="1000" height="420">
  <!-- Background -->
  <rect x="0" y="0" width="1000" height="420" fill="#faf7f0"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-family="Georgia, 'Iowan Old Style', serif" font-size="18" font-weight="bold" fill="#1d1d1b">
    matMulBatch — a 3-D tensor is a stack of 2-D matrices
  </text>
  <text x="500" y="58" text-anchor="middle" font-family="Georgia, 'Iowan Old Style', serif" font-size="12" fill="#64748b">
    [B=3, M=2, K=3] × [B=3, K=3, N=2] → [B=3, M=2, N=2] · the 2-D matMul is applied independently per batch slice
  </text>

  <!-- Shape labels above each tensor -->
  <text x="160" y="100" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#0f766e" font-weight="bold">A  [3, 2, 3]</text>
  <text x="450" y="100" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#b45309" font-weight="bold">B  [3, 3, 2]</text>
  <text x="760" y="100" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="12" fill="#be185d" font-weight="bold">C  [3, 2, 2]</text>

  <!-- Operators -->
  <text x="305" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#64748b" font-weight="bold">×</text>
  <text x="610" y="240" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#64748b" font-weight="bold">=</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- TENSOR A — 3 slabs stacked along the batch axis           -->
  <!-- Each slab is a 2×3 matrix. Front=A[0], back=A[2].         -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- A[2] (back slab) -->
  <g transform="translate(-44, -28)">
    <rect x="110" y="170" width="160" height="110" rx="8" fill="#d8f0eb" stroke="#0f766e" stroke-width="1.4" stroke-dasharray="3 3">
      <animate attributeName="opacity" values="0.35;0.35;1" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <text x="190" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="bold" fill="#0f766e">
      <animate attributeName="opacity" values="0.45;0.45;1" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
      A[2]
    </text>
  </g>

  <!-- A[1] (middle slab) -->
  <g transform="translate(-22, -14)">
    <rect x="110" y="170" width="160" height="110" rx="8" fill="#d8f0eb" stroke="#0f766e" stroke-width="1.4" stroke-dasharray="3 3">
      <animate attributeName="opacity" values="0.35;1;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <text x="190" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="bold" fill="#0f766e">
      <animate attributeName="opacity" values="0.45;1;0.45" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
      A[1]
    </text>
  </g>

  <!-- A[0] (front slab) — full matrix visible -->
  <g>
    <rect x="110" y="170" width="160" height="110" rx="8" fill="#d8f0eb" stroke="#0f766e" stroke-width="1.6">
      <animate attributeName="opacity" values="1;0.35;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <!-- 2x3 grid of values -->
    <rect x="120" y="180" width="40" height="40" rx="4" fill="#ffffff" stroke="#0f766e" stroke-width="1"/>
    <text x="140" y="207" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#0f766e">1</text>
    <rect x="165" y="180" width="40" height="40" rx="4" fill="#ffffff" stroke="#0f766e" stroke-width="1"/>
    <text x="185" y="207" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#0f766e">2</text>
    <rect x="210" y="180" width="40" height="40" rx="4" fill="#ffffff" stroke="#0f766e" stroke-width="1"/>
    <text x="230" y="207" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#0f766e">3</text>
    <rect x="120" y="225" width="40" height="40" rx="4" fill="#ffffff" stroke="#0f766e" stroke-width="1"/>
    <text x="140" y="252" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#0f766e">4</text>
    <rect x="165" y="225" width="40" height="40" rx="4" fill="#ffffff" stroke="#0f766e" stroke-width="1"/>
    <text x="185" y="252" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#0f766e">5</text>
    <rect x="210" y="225" width="40" height="40" rx="4" fill="#ffffff" stroke="#0f766e" stroke-width="1"/>
    <text x="230" y="252" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#0f766e">6</text>
    <animate attributeName="opacity" values="1;0.35;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
  </g>

  <!-- Depth connector lines for A (showing 3D stack) -->
  <line x1="110" y1="170" x2="66" y2="142" stroke="#0f766e" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="270" y1="170" x2="226" y2="142" stroke="#0f766e" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="270" y1="280" x2="226" y2="252" stroke="#0f766e" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- Batch-axis arrow for A -->
  <line x1="60" y1="305" x2="105" y2="305" stroke="#64748b" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="82" y="324" text-anchor="middle" font-family="Georgia,serif" font-size="10" fill="#64748b" font-style="italic">batch axis (b)</text>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- TENSOR B — 3 slabs of 3×2 matrices                        -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- B[2] back -->
  <g transform="translate(-44, -28)">
    <rect x="400" y="155" width="120" height="135" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.4" stroke-dasharray="3 3">
      <animate attributeName="opacity" values="0.35;0.35;1" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <text x="460" y="228" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="bold" fill="#b45309">
      <animate attributeName="opacity" values="0.45;0.45;1" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
      B[2]
    </text>
  </g>

  <!-- B[1] middle -->
  <g transform="translate(-22, -14)">
    <rect x="400" y="155" width="120" height="135" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.4" stroke-dasharray="3 3">
      <animate attributeName="opacity" values="0.35;1;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <text x="460" y="228" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="bold" fill="#b45309">
      <animate attributeName="opacity" values="0.45;1;0.45" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
      B[1]
    </text>
  </g>

  <!-- B[0] front — full 3x2 matrix -->
  <g>
    <rect x="400" y="155" width="120" height="135" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.6">
      <animate attributeName="opacity" values="1;0.35;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <rect x="410" y="165" width="45" height="38" rx="4" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <text x="432" y="190" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#b45309">7</text>
    <rect x="460" y="165" width="45" height="38" rx="4" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <text x="482" y="190" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#b45309">8</text>
    <rect x="410" y="207" width="45" height="38" rx="4" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <text x="432" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#b45309">9</text>
    <rect x="460" y="207" width="45" height="38" rx="4" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <text x="482" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#b45309">10</text>
    <rect x="410" y="249" width="45" height="38" rx="4" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <text x="432" y="274" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#b45309">11</text>
    <rect x="460" y="249" width="45" height="38" rx="4" fill="#ffffff" stroke="#b45309" stroke-width="1"/>
    <text x="482" y="274" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="14" font-weight="bold" fill="#b45309">12</text>
    <animate attributeName="opacity" values="1;0.35;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
  </g>

  <line x1="400" y1="155" x2="356" y2="127" stroke="#b45309" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="520" y1="155" x2="476" y2="127" stroke="#b45309" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="520" y1="290" x2="476" y2="262" stroke="#b45309" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- ════════════════════════════════════════════════════════ -->
  <!-- TENSOR C — 3 slabs of 2×2 matrices                        -->
  <!-- ════════════════════════════════════════════════════════ -->

  <!-- C[2] back -->
  <g transform="translate(-44, -28)">
    <rect x="700" y="180" width="120" height="90" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.4" stroke-dasharray="3 3">
      <animate attributeName="opacity" values="0.35;0.35;1" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <text x="760" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="bold" fill="#be185d">
      <animate attributeName="opacity" values="0.45;0.45;1" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
      C[2]
    </text>
  </g>

  <!-- C[1] middle -->
  <g transform="translate(-22, -14)">
    <rect x="700" y="180" width="120" height="90" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.4" stroke-dasharray="3 3">
      <animate attributeName="opacity" values="0.35;1;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <text x="760" y="232" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="20" font-weight="bold" fill="#be185d">
      <animate attributeName="opacity" values="0.45;1;0.45" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
      C[1]
    </text>
  </g>

  <!-- C[0] front — full 2x2 matrix -->
  <g>
    <rect x="700" y="180" width="120" height="90" rx="8" fill="#fce7f3" stroke="#be185d" stroke-width="1.6">
      <animate attributeName="opacity" values="1;0.35;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
    <rect x="710" y="190" width="50" height="35" rx="4" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
    <text x="735" y="213" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="bold" fill="#be185d">58</text>
    <rect x="765" y="190" width="50" height="35" rx="4" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
    <text x="790" y="213" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="bold" fill="#be185d">64</text>
    <rect x="710" y="229" width="50" height="35" rx="4" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
    <text x="735" y="252" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="bold" fill="#be185d">139</text>
    <rect x="765" y="229" width="50" height="35" rx="4" fill="#ffffff" stroke="#be185d" stroke-width="1"/>
    <text x="790" y="252" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" font-weight="bold" fill="#be185d">154</text>
    <animate attributeName="opacity" values="1;0.35;0.35" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
  </g>

  <line x1="700" y1="180" x2="656" y2="152" stroke="#be185d" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="820" y1="180" x2="776" y2="152" stroke="#be185d" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>
  <line x1="820" y1="270" x2="776" y2="242" stroke="#be185d" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.5"/>

  <!-- ═══ caption strip ════════════════════════════════════════ -->
  <rect x="80" y="345" width="840" height="48" rx="10" fill="#ffffff" stroke="#e2dfd8" stroke-width="1.2"/>

  <!-- Phase 0: highlight A[0] × B[0] = C[0] -->
  <text x="500" y="365" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1d1d1b">
    <animate attributeName="opacity" values="1;0;0" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    batch b = 0  ·  C[0] = matMul(A[0], B[0])
  </text>
  <text x="500" y="382" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#64748b">
    <animate attributeName="opacity" values="1;0;0" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    take the front slice of A, the front slice of B, multiply them as 2-D matrices → store in front slice of C
  </text>

  <!-- Phase 1 -->
  <text x="500" y="365" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1d1d1b">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    batch b = 1  ·  C[1] = matMul(A[1], B[1])
  </text>
  <text x="500" y="382" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#64748b">
    <animate attributeName="opacity" values="0;1;0" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    same operation on the next slice — every batch slice is independent
  </text>

  <!-- Phase 2 -->
  <text x="500" y="365" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="13" fill="#1d1d1b">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    batch b = 2  ·  C[2] = matMul(A[2], B[2])
  </text>
  <text x="500" y="382" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#64748b">
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.333;0.667" dur="6s" calcMode="discrete" repeatCount="indefinite"/>
    in the transformer, the batch axis carries sentences or heads — each gets its own matMul, in parallel on the GPU
  </text>

  <!-- arrow marker def -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
