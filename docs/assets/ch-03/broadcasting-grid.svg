<rect x="80" y="390" width="800" height="96" rx="10" fill="#ffffff" stroke="#e2dfd8" stroke-width="1.2"/>
<text x="100" y="418" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="bold" fill="#1d1d1b">Broadcasting memory rule</text>
<text x="104" y="442" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">1.</text>
<text x="132" y="442" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1d1d1b">Line shapes up from the right.</text>
<text x="104" y="460" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">2.</text>
<text x="132" y="460" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1d1d1b">At each axis, sizes must match or one of them must be 1.</text>
<text x="104" y="478" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">3.</text>
<text x="132" y="478" font-size="12" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1d1d1b">The result takes the larger size at each axis.</text>
<rect x="610" y="96" width="250" height="32" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.5"/>
<text x="735.0" y="117" text-anchor="middle" font-size="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">broadcastShapes([3,1], [1,4]) = [3,4]</text>
</svg>