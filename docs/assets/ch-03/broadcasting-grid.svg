<text x="480.0" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1d1d1b">broadcasting  ·  right-align shapes, then stretch the size-1 axes</text>
<text x="480.0" y="62" text-anchor="middle" font-size="12" fill="#64748b">[3, 1] + [1, 4]  →  [3, 4]  ·  no new math, just reuse along axes of size 1</text>
