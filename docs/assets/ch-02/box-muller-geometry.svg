<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 540" font-family="Georgia, 'Iowan Old Style', serif">
<rect width="1080" height="540" fill="#faf7f0"/>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/></marker>
<marker id="arrAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b45309"/></marker>
<marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#7c3aed"/></marker>
</defs>
<text x="540.0" y="40" text-anchor="middle" font-size="20" font-weight="bold" fill="#1d1d1b">Box–Muller geometry  ·  uniform → polar → cartesian</text>
<text x="540.0" y="60" text-anchor="middle" font-size="12" fill="#64748b">One concrete sample, shown in three coordinate systems.  u₁ = 0.500, u₂ = 0.250.</text>
<rect x="24" y="90" width="320" height="360" rx="14" fill="#ffffff" stroke="#e2dfd8" stroke-width="1.2"/>
<text x="184.0" y="114" text-anchor="middle" font-size="14" font-weight="bold" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1d1d1b">1.  Pick (u₁, u₂)</text>
<text x="184.0" y="132" text-anchor="middle" font-size="11" fill="#64748b">uniformly from the unit square</text>
<rect x="74.0" y="160" width="220" height="220" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.4" rx="4"/>
<line x1="129.0" y1="160" x2="129.0" y2="380" stroke="#7c3aed" stroke-width="0.6" opacity="0.35"/>
<line x1="74.0" y1="215.0" x2="294.0" y2="215.0" stroke="#7c3aed" stroke-width="0.6" opacity="0.35"/>
<line x1="184.0" y1="160" x2="184.0" y2="380" stroke="#7c3aed" stroke-width="0.6" opacity="0.35"/>
<line x1="74.0" y1="270.0" x2="294.0" y2="270.0" stroke="#7c3aed" stroke-width="0.6" opacity="0.35"/>
<line x1="239.0" y1="160" x2="239.0" y2="380" stroke="#7c3aed" stroke-width="0.6" opacity="0.35"/>
<line x1="74.0" y1="325.0" x2="294.0" y2="325.0" stroke="#7c3aed" stroke-width="0.6" opacity="0.35"/>
<text x="64.0" y="384" text-anchor="end" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">0</text>
<text x="64.0" y="164" text-anchor="end" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">1</text>
<text x="294.0" y="398" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">1</text>
<text x="74.0" y="398" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">0</text>
<text x="184.0" y="412" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">u₁</text>
<text x="48.0" y="270.0" text-anchor="middle" font-size="11" fill="#7c3aed" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" transform="rotate(-90 48.0 270.0)">u₂</text>
<line x1="74.0" y1="325.0" x2="184.0" y2="325.0" stroke="#b45309" stroke-width="1.2" stroke-dasharray="4 3"/>
<line x1="184.0" y1="380" x2="184.0" y2="325.0" stroke="#b45309" stroke-width="1.2" stroke-dasharray="4 3"/>
<circle cx="184.0" cy="325.0" r="6" fill="#b45309" stroke="#ffffff" stroke-width="1.4"/>
<text x="194.0" y="317.0" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">(0.50, 0.25)</text>
<rect x="54" y="400" width="260" height="36" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.4"/>
<text x="184.0" y="422" text-anchor="middle" font-size="13" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">u₁ = 0.500   ·   u₂ = 0.250</text>
<rect x="386" y="90" width="320" height="360" rx="14" fill="#ffffff" stroke="#e2dfd8" stroke-width="1.2"/>
<text x="546.0" y="114" text-anchor="middle" font-size="14" font-weight="bold" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1d1d1b">2.  Re-read as polar (r, θ)</text>
<text x="546.0" y="132" text-anchor="middle" font-size="11" fill="#64748b">r = √(−2 ln u₁)   ·   θ = 2π u₂</text>
<circle cx="546.0" cy="270" r="40.0" fill="none" stroke="#0f766e" stroke-width="0.8" opacity="0.45" stroke-dasharray="3 3"/>
<text x="590.0" y="266" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#0f766e">1σ</text>
<circle cx="546.0" cy="270" r="80.0" fill="none" stroke="#0f766e" stroke-width="0.8" opacity="0.45" stroke-dasharray="3 3"/>
<text x="630.0" y="266" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#0f766e">2σ</text>
<circle cx="546.0" cy="270" r="100" fill="#d8f0eb" stroke="#0f766e" stroke-width="1.2" opacity="0.55"/>
<line x1="446.0" y1="270" x2="646.0" y2="270" stroke="#64748b" stroke-width="0.8" stroke-dasharray="2 3"/>
<line x1="546.0" y1="370" x2="546.0" y2="170" stroke="#64748b" stroke-width="0.8" stroke-dasharray="2 3"/>
<line x1="546.0" y1="270" x2="546.0" y2="222.903599099381" stroke="#b45309" stroke-width="2.2" marker-end="url(#arrAmber)"/>
<path d="M 576.0 270 A 30 30 0 0 0 546.0 240.0" fill="none" stroke="#b45309" stroke-width="1.4"/>
<text x="580.0" y="258" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">θ</text>
<text x="524.0" y="240.45179954969052" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">r</text>
<circle cx="546.0" cy="222.903599099381" r="6" fill="#b45309" stroke="#ffffff" stroke-width="1.4"/>
<rect x="404" y="386" width="284" height="50" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.4"/>
<text x="546.0" y="406" text-anchor="middle" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">r = √(−2 ln 0.5) ≈ 1.177</text>
<text x="546.0" y="424" text-anchor="middle" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">θ = 2π · 0.25 = π/2</text>
<rect x="748" y="90" width="320" height="360" rx="14" fill="#ffffff" stroke="#e2dfd8" stroke-width="1.2"/>
<text x="908.0" y="114" text-anchor="middle" font-size="14" font-weight="bold" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1d1d1b">3.  Project to cartesian</text>
<text x="908.0" y="132" text-anchor="middle" font-size="11" fill="#64748b">z₀ = r cos θ   ·   z₁ = r sin θ</text>
<circle cx="908.0" cy="270" r="40.0" fill="none" stroke="#b45309" stroke-width="1" opacity="0.45" stroke-dasharray="3 3"/>
<text x="952.0" y="266" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">1σ</text>
<circle cx="908.0" cy="270" r="80.0" fill="none" stroke="#b45309" stroke-width="1" opacity="0.45" stroke-dasharray="3 3"/>
<text x="992.0" y="266" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">2σ</text>
<line x1="800.0" y1="270" x2="1016.0" y2="270" stroke="#1d1d1b" stroke-width="1" marker-end="url(#arr)"/>
<line x1="908.0" y1="378" x2="908.0" y2="162" stroke="#1d1d1b" stroke-width="1" marker-end="url(#arr)"/>
<text x="1024.0" y="274" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1d1d1b">z₀</text>
<text x="904.0" y="156" text-anchor="end" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#1d1d1b">z₁</text>
<line x1="828.0" y1="267" x2="828.0" y2="273" stroke="#1d1d1b" stroke-width="1"/>
<text x="828.0" y="286" text-anchor="middle" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">-2</text>
<line x1="905.0" y1="350.0" x2="911.0" y2="350.0" stroke="#1d1d1b" stroke-width="1"/>
<text x="900.0" y="354.0" text-anchor="end" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">-2</text>
<line x1="868.0" y1="267" x2="868.0" y2="273" stroke="#1d1d1b" stroke-width="1"/>
<text x="868.0" y="286" text-anchor="middle" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">-1</text>
<line x1="905.0" y1="310.0" x2="911.0" y2="310.0" stroke="#1d1d1b" stroke-width="1"/>
<text x="900.0" y="314.0" text-anchor="end" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">-1</text>
<line x1="948.0" y1="267" x2="948.0" y2="273" stroke="#1d1d1b" stroke-width="1"/>
<text x="948.0" y="286" text-anchor="middle" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">1</text>
<line x1="905.0" y1="230.0" x2="911.0" y2="230.0" stroke="#1d1d1b" stroke-width="1"/>
<text x="900.0" y="234.0" text-anchor="end" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">1</text>
<line x1="988.0" y1="267" x2="988.0" y2="273" stroke="#1d1d1b" stroke-width="1"/>
<text x="988.0" y="286" text-anchor="middle" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">2</text>
<line x1="905.0" y1="190.0" x2="911.0" y2="190.0" stroke="#1d1d1b" stroke-width="1"/>
<text x="900.0" y="194.0" text-anchor="end" font-size="9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">2</text>
<line x1="908.0" y1="222.903599099381" x2="908.0" y2="222.903599099381" stroke="#b45309" stroke-width="1.2" stroke-dasharray="4 3"/>
<line x1="908.0" y1="270" x2="908.0" y2="222.903599099381" stroke="#b45309" stroke-width="1.2" stroke-dasharray="4 3"/>
<circle cx="908.0" cy="222.903599099381" r="6" fill="#b45309" stroke="#ffffff" stroke-width="1.4"/>
<text x="918.0" y="214.903599099381" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">(z₀, z₁)</text>
<rect x="766" y="386" width="284" height="50" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="1.4"/>
<text x="908.0" y="406" text-anchor="middle" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">z₀ = +0.000   ·   z₁ = +1.177</text>
<text x="908.0" y="424" text-anchor="middle" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#b45309">two independent N(0, 1) samples</text>
<line x1="348" y1="270.0" x2="382" y2="270.0" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/><text x="365.0" y="262.0" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">polar</text>
<line x1="710" y1="270.0" x2="744" y2="270.0" stroke="#64748b" stroke-width="1.6" marker-end="url(#arr)"/><text x="727.0" y="262.0" text-anchor="middle" font-size="10" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#64748b">cartesian</text>
<text x="540.0" y="528" text-anchor="middle" font-size="11" fill="#64748b" font-style="italic">The amber dot is the same sample throughout — only its coordinate frame changes.</text>
</svg>